<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Missing Persons · MySafety</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/assets/css/console.css">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237C9BFF' stroke-width='2'><path d='M12 2 4 5v6c0 5 3.5 9.3 8 11 4.5-1.7 8-6 8-11V5l-8-3z'/></svg>">
</head>
<body>
  <div id="ms-root"></div>

  <template id="ms-page-template">
    <section class="ms-section">
      <header class="ms-page-header">
        <div>
          <p class="ms-eyebrow">Public register</p>
          <h1 class="ms-page-header__title">Missing persons</h1>
          <p class="ms-page-header__sub">Every active case across Dhaka Metropolitan. Tap a card to see the full record and submit a sighting.</p>
        </div>
        <div class="ms-page-header__actions">
          <a href="/report-missing" class="ms-btn ms-btn--primary">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-alert-triangle"/></svg>
            <span>Report a missing person</span>
          </a>
        </div>
      </header>

      <div id="missingGrid" class="ms-grid ms-grid--3" aria-live="polite"></div>
    </section>
  </template>

  <!-- Modal (preserved from the original — full feature set) -->
  <div id="backdrop" class="ms-modal-back" hidden>
    <div class="ms-modal ms-modal--wide">
      <header class="ms-modal__head">
        <h2 id="modalTitle" class="ms-modal__title">Details</h2>
        <button id="closeModal" class="ms-modal__close" aria-label="Close">
          <svg class="ms-icon" aria-hidden="true"><use href="#ms-x"/></svg>
        </button>
      </header>
      <div id="modalBody" class="ms-modal__body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/static/assets/js/api-base.js"></script>
  <script src="/static/assets/js/escape.js"></script>
  <script src="/static/assets/js/console.js"></script>
  <script>
  "use strict";

  const API_BASE = window.location.origin.includes(":8000") ? "" : "http://127.0.0.1:8000";
  const $ = (sel) => document.querySelector(sel);

  let missingData = [];

  const escapeHtml = (str) => String(str).replace(/[&<>"'`=\/]/g, (char) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;',
    "'": '&#39;', '`': '&#96;', '=': '&#61;', '/': '&#47;'
  }[char] || char));

  const fmt = (value) => {
    if (!value) return "Unknown";
    const date = typeof value === "string" ? new Date(value) : value;
    return isNaN(date.valueOf()) ? "Unknown" : date.toLocaleString();
  };

  const resolvePhoto = (url) => {
    if (!url) return "contents/placeholder.jpg";
    if (url.startsWith("http")) return url;
    if (url.startsWith("/")) return url;
    if (url.startsWith("static/")) return `/${url}`;
    return `/static/${url}`;
  };

  const secondsToHHMMSS = (seconds) => {
    const total = Math.max(0, Math.floor(Number(seconds) || 0));
    const h = String(Math.floor(total / 3600)).padStart(2, "0");
    const m = String(Math.floor((total % 3600) / 60)).padStart(2, "0");
    const s = String(total % 60).padStart(2, "0");
    return `${h}:${m}:${s}`;
  };

  const parseTimeField = (value) => {
    if (value === null || value === undefined || value === "") return null;
    if (typeof value === "number") return secondsToHHMMSS(value);
    const trimmed = String(value).trim();
    if (/^\d+(\.\d+)?$/.test(trimmed)) return secondsToHHMMSS(Number(trimmed));
    if (trimmed.includes(":")) return trimmed.length === 5 ? `${trimmed}:00` : trimmed;
    return null;
  };

  const parseHometown = (text) => {
    if (!text) return null;
    const match = String(text).match(/Hometown:\s*([^.\n]+)/i);
    return match ? match[1].trim() : null;
  };

  const normalizeRow = (row) => {
    const date = row.last_seen_date ? String(row.last_seen_date) : null;
    const time = parseTimeField(row.last_seen_time);
    let iso = null;
    if (date) {
      const candidate = new Date(`${date}T${time || "00:00:00"}`);
      if (!isNaN(candidate.valueOf())) iso = candidate.toISOString();
    }
    if (!iso && row.created_at) {
      const created = new Date(row.created_at);
      if (!isNaN(created.valueOf())) iso = created.toISOString();
    }
    const weight = row.weight ? parseFloat(String(row.weight).replace(/[^\d.]/g, "")) || null : null;
    const stillWithFinderValue = (() => {
      const source = row.still_with_finder;
      if (source === null || source === undefined) return false;
      if (typeof source === "string") {
        const normalized = source.trim().toLowerCase();
        return normalized === "yes" || normalized === "true" || normalized === "1";
      }
      if (typeof source === "number") return source === 1;
      return Boolean(source);
    })();
    return {
      id: row.missing_id,
      name: row.name || "Unknown",
      nickname: row.distinguishing_marks || null,
      photo_url: resolvePhoto(row.photo_url),
      hometown: parseHometown(row.description) || row.contact_person || "—",
      last_seen_location: row.last_seen_location || "Unknown",
      last_seen_time: iso,
      description: row.clothing_description || row.description || "",
      finding_location: row.finding_location || null,
      finder_name: row.finder_name || null,
      finder_phone: row.finder_phone || null,
      finder_email: row.finder_email || null,
      status: row.status || "Missing",
      still_with_finder: stillWithFinderValue,
      age: row.age ?? null,
      weight_kg: weight,
      hair_color: row.hair_color || "—"
    };
  };

  const showStatus = (message) => {
    const grid = $("#missingGrid");
    grid.innerHTML = `
      <div class="ms-empty ms-grid--span-3">
        <svg class="ms-icon ms-empty__icon" aria-hidden="true"><use href="#ms-search"/></svg>
        <p>${escapeHtml(message)}</p>
      </div>`;
  };

  const render = (list = missingData) => {
    const grid = $("#missingGrid");
    grid.innerHTML = "";
    if (!list.length) { showStatus("No missing persons found."); return; }
    list.forEach((item) => grid.appendChild(card(item)));
  };

  const card = (item) => {
    const el = document.createElement("article");
    el.className = "ms-card ms-card--no-pad";
    const statusLower = (item.status || "").toLowerCase();
    const accent = statusLower === "found" ? "ms-card--accent-green" :
                   statusLower === "missing" ? "ms-card--accent-amber" :
                   "ms-card--accent-blue";
    el.classList.add(accent);
    const statusPill = statusLower === "found" ? "ms-pill--green" :
                       statusLower === "missing" ? "ms-pill--amber" :
                       "ms-pill--ink";
    const finderBadgeText = item.still_with_finder ? "With finder" : "Not with finder";
    el.innerHTML = `
      <img class="ms-card__cover" src="${escapeHtml(item.photo_url || '')}" alt="${escapeHtml(item.name || '')}" onerror="this.src='contents/placeholder.jpg'">
      <div class="ms-card__body">
        <header class="ms-row ms-row--between">
          <div>
            <h3 class="ms-card__title">${escapeHtml(item.name || 'Unknown')}</h3>
            <p class="ms-card__sub">${escapeHtml(item.nickname || '—')}</p>
          </div>
          <span class="ms-pill ${statusPill}"><span class="ms-pill__dot"></span>${escapeHtml(item.status || 'Unknown')}</span>
        </header>
        <dl class="ms-card__facts">
          <div><dt>Hometown</dt><dd>${escapeHtml(item.hometown || '—')}</dd></div>
          <div><dt>Last seen</dt><dd>${escapeHtml(item.last_seen_location || '—')}</dd></div>
          <div><dt>Time</dt><dd>${escapeHtml(fmt(item.last_seen_time))}</dd></div>
          <div><dt>Finder</dt><dd>${escapeHtml(finderBadgeText)}</dd></div>
        </dl>
        <button type="button" class="ms-btn ms-btn--ghost ms-btn--sm ms-btn--block show">View details</button>
      </div>`;
    el.querySelector(".show").addEventListener("click", () => openModal(item));
    return el;
  };

  const loadMissingPersons = async () => {
    showStatus("Loading missing persons…");
    try {
      const response = await fetch(resolveApiUrl("/api/missing-persons"), { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const payload = await response.json();
      const rows = Array.isArray(payload) ? payload : payload.missing_persons || [];
      missingData = rows.map(normalizeRow);
      render();
    } catch (error) {
      console.error("Error loading missing persons:", error);
      showStatus("Unable to load data from the server.");
    }
  };

  const openModal = (item) => {
    $("#modalTitle").textContent = `${item.name} — Details`;
    $("#modalBody").innerHTML = `
      <div class="ms-modal__grid">
        <img class="ms-modal__cover" src="${escapeHtml(item.photo_url || '')}" alt="${escapeHtml(item.name || '')}" onerror="this.src='contents/placeholder.jpg'">
        <div class="ms-modal__copy">
          <p><b>Nickname:</b> ${escapeHtml(item.nickname || "—")}</p>
          <p><b>Age:</b> ${escapeHtml(item.age ?? "—")} yrs · <b>Weight:</b> ${escapeHtml(item.weight_kg ?? "—")} kg · <b>Hair:</b> ${escapeHtml(item.hair_color || "—")}</p>
          <p><b>Hometown:</b> ${escapeHtml(item.hometown || "—")}</p>
          <p><b>Status:</b> ${escapeHtml(item.status || "Missing")}</p>
          <p><b>Last seen:</b> ${escapeHtml(item.last_seen_location)} at ${fmt(item.last_seen_time)}</p>
          <p><b>Finding location (latest):</b> ${escapeHtml(item.finding_location || "—")}</p>
          <p><b>Finder:</b> ${escapeHtml(item.finder_name || "—")} (${escapeHtml(item.finder_phone || "—")})</p>
          ${item.finder_email ? `<p><b>Email:</b> ${escapeHtml(item.finder_email)}</p>` : ""}
          <p class="ms-card__sub">${escapeHtml(item.description || "")}</p>
          <button id="foundBtn" class="ms-btn ms-btn--primary">${item.finding_location || item.finder_name ? "Update finder report" : "Report found"}</button>
          <div id="foundForm" class="ms-card ms-card--nested" hidden>
            <p class="ms-card__sub">Tip: GPS works on https:// or http://localhost</p>
            <label class="ms-field"><span class="ms-field__label">Where did you find this person?</span>
              <input id="foundLocation" class="ms-input" placeholder="Type a location or use GPS">
            </label>
            <label class="ms-row">
              <input type="checkbox" id="useGps"> <span>Use my current location</span>
            </label>
            <div id="geoMsg" class="ms-card__sub"></div>
            <label class="ms-field"><span class="ms-field__label">Your name</span><input id="finderName" class="ms-input" placeholder="Your full name"></label>
            <label class="ms-field"><span class="ms-field__label">Your phone</span><input id="finderPhone" class="ms-input" placeholder="Phone number"></label>
            <label class="ms-field"><span class="ms-field__label">Your email (optional)</span><input id="finderEmail" class="ms-input" placeholder="Email"></label>
            <div id="stillWrap" class="ms-card__sub"></div>
            <div id="stillQuestion" class="ms-card__sub"></div>
            <button id="toggleFinderBtn" class="ms-btn ms-btn--ghost ms-btn--sm">Toggle finder status</button>
            <button id="submitFound" class="ms-btn ms-btn--primary ms-btn--block">Submit report</button>
          </div>
        </div>
      </div>`;

    const backdrop = $("#backdrop");
    backdrop.hidden = false;

    const foundForm = $("#foundForm");
    const foundBtn = $("#foundBtn");
    const foundLocationInput = $("#foundLocation");
    const finderNameInput = $("#finderName");
    const finderPhoneInput = $("#finderPhone");
    const finderEmailInput = $("#finderEmail");
    const toggleFinderBtn = $("#toggleFinderBtn");
    const stillQuestion = $("#stillQuestion");
    let stillWithFinder = Boolean(item.still_with_finder);

    const updateFinderToggleUI = () => {
      if (stillWithFinder) {
        toggleFinderBtn.textContent = "Mark as not with finder";
        toggleFinderBtn.classList.remove("ms-btn--ghost");
        toggleFinderBtn.classList.add("ms-btn--primary");
        stillQuestion.innerHTML = "Currently marked as <b>with the finder</b>. Click to change.";
      } else {
        toggleFinderBtn.textContent = "Mark as still with finder";
        toggleFinderBtn.classList.add("ms-btn--ghost");
        toggleFinderBtn.classList.remove("ms-btn--primary");
        stillQuestion.innerHTML = "Is this person still with you? Click to mark as still with the finder.";
      }
    };
    foundLocationInput.value = item.finding_location || "";
    finderNameInput.value = item.finder_name || "";
    finderPhoneInput.value = item.finder_phone || "";
    finderEmailInput.value = item.finder_email || "";
    updateFinderToggleUI();
    if (item.finding_location || item.finder_name || item.finder_phone) foundForm.hidden = false;

    foundBtn.onclick = () => { foundForm.hidden = !foundForm.hidden; };

    $("#useGps").addEventListener("change", async (e) => {
      const msg = $("#geoMsg");
      if (e.target.checked) {
        msg.textContent = "Getting your location…";
        try {
          const coords = await getCurrentCoords();
          foundLocationInput.value = coords;
          msg.textContent = "Location filled from GPS.";
        } catch (err) {
          msg.textContent = "Could not get location: " + err.message;
          e.target.checked = false;
        }
      } else { msg.textContent = ""; }
    });

    toggleFinderBtn.addEventListener("click", (event) => {
      event.preventDefault();
      stillWithFinder = !stillWithFinder;
      updateFinderToggleUI();
    });

    $("#submitFound").onclick = async () => {
      const location = foundLocationInput.value.trim();
      const name = finderNameInput.value.trim();
      const phone = finderPhoneInput.value.trim();
      const email = finderEmailInput.value.trim();

      if (!location) {
        await Swal.fire({ icon: 'warning', title: 'Location required', text: 'Please add a location or enable GPS before submitting.' });
        return;
      }
      if (!name || !phone) {
        await Swal.fire({ icon: 'warning', title: 'Contact details needed', text: 'Please provide your name and phone number.' });
        return;
      }
      const submitBtn = $("#submitFound");
      const originalLabel = submitBtn.textContent;
      submitBtn.disabled = true; submitBtn.textContent = "Submitting…";
      try {
        const response = await fetch(resolveApiUrl(`/api/missing-persons/${item.id}/found`), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ finding_location: location, finder_name: name, finder_phone: phone, finder_email: email || null, still_with_finder: stillWithFinder })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.detail || payload.message || 'Unable to save finder report.');
        const updated = normalizeRow(payload.missing_person);
        const idx = missingData.findIndex((entry) => entry.id === updated.id);
        if (idx >= 0) missingData[idx] = updated; else missingData.push(updated);
        render();
        await Swal.fire({ icon: 'success', title: 'Report submitted', text: 'Finder details saved successfully.' });
        closeModal();
      } catch (error) {
        await Swal.fire({ icon: 'error', title: 'Could not save report', text: error.message || 'An unexpected error occurred.' });
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = originalLabel;
      }
    };
  };

  const closeModal = () => { $("#backdrop").hidden = true; };

  $("#closeModal").addEventListener("click", closeModal);
  $("#backdrop").addEventListener("click", (e) => { if (e.target.id === "backdrop") closeModal(); });

  function getCurrentCoords() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error("Geolocation not supported"));
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve(`${pos.coords.latitude}, ${pos.coords.longitude}`),
        (err) => reject(err),
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });
  }

  // Boot: wait for chrome to render the template into #ms-page, then load data.
  document.addEventListener('DOMContentLoaded', function () {
    // console.js already auto-mounted the chrome on this page (because it
    // sees <div id="ms-root">). After that, #missingGrid exists inside the
    // page body, so we can fetch and render.
    if (document.getElementById('missingGrid')) loadMissingPersons();
  });
  </script>
</body>
</html>
