<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySafety · Civic Operations Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/assets/css/console.css">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237C9BFF' stroke-width='2'><path d='M12 2 4 5v6c0 5 3.5 9.3 8 11 4.5-1.7 8-6 8-11V5l-8-3z'/></svg>">
</head>
<body>
  <div id="ms-root"></div>

  <template id="ms-page-template">
    <!-- Hero with globe -->
    <section class="ms-hero">
      <div class="ms-hero__copy">
        <p class="ms-eyebrow">Civic Operations Console</p>
        <h1 class="ms-hero__title">A live picture of safety, across <span class="ms-hero__hl">Dhaka Metropolitan</span>.</h1>
        <p class="ms-hero__sub">Triage reports, broadcast alerts, and follow cases from FIR to closure — in one workspace.</p>
        <div class="ms-hero__cta">
          <a href="/admin" class="ms-btn ms-btn--primary">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-briefcase"/></svg>
            <span>Open the console</span>
          </a>
          <a href="/dashboard" class="ms-btn ms-btn--ghost">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-globe-icon"/></svg>
            <span>Plan a route</span>
          </a>
        </div>

        <div class="ms-hero__metrics">
          <div>
            <p class="ms-hero__metric-figure">2,847</p>
            <p class="ms-hero__metric-label">Incidents on record</p>
          </div>
          <div>
            <p class="ms-hero__metric-figure">186</p>
            <p class="ms-hero__metric-label">Cleared this month</p>
          </div>
          <div>
            <p class="ms-hero__metric-figure">14</p>
            <p class="ms-hero__metric-label">Stations online</p>
          </div>
        </div>
      </div>

      <div class="ms-hero__globe">
        <div class="ms-globe" id="ms-globe" role="img" aria-label="Live alert map centred on Dhaka"></div>
        <div class="ms-globe__legend" aria-hidden="true">
          <span><span class="ms-legend-dot ms-legend-dot--red"></span>Active</span>
          <span><span class="ms-legend-dot ms-legend-dot--amber"></span>Pending</span>
          <span><span class="ms-legend-dot ms-legend-dot--blue"></span>Informational</span>
          <span><span class="ms-legend-dot ms-legend-dot--green"></span>Cleared</span>
        </div>
        <div class="ms-globe__callout">
          <span class="ms-pill ms-pill--ink">Centre: 23.81° N · 90.41° E</span>
        </div>
      </div>
    </section>

    <!-- Action rail -->
    <section class="ms-section">
      <header class="ms-section-header">
        <div>
          <p class="ms-eyebrow">Quick actions</p>
          <h2 class="ms-section-header__title">Where do you want to start?</h2>
        </div>
        <span class="ms-pill ms-pill--green"><span class="ms-pill__dot"></span>All systems online</span>
      </header>

      <div class="ms-grid ms-grid--4">
        <a class="ms-card ms-card--accent-red ms-card--click" href="/report-crime">
          <span class="ms-stat__icon ms-stat__icon--red">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-alert-triangle"/></svg>
          </span>
          <h3 class="ms-card__title">File a crime report</h3>
          <p class="ms-card__lede">Capture incident details, location, and evidence. Routed to the right station automatically.</p>
          <span class="ms-card__cta">Open form
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-arrow-right"/></svg>
          </span>
        </a>

        <a class="ms-card ms-card--accent-amber ms-card--click" href="/report-missing">
          <span class="ms-stat__icon ms-stat__icon--amber">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-user"/></svg>
          </span>
          <h3 class="ms-card__title">Report a missing person</h3>
          <p class="ms-card__lede">Time-critical. We push a citywide alert and notify nearby stations the moment you file.</p>
          <span class="ms-card__cta">Open form
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-arrow-right"/></svg>
          </span>
        </a>

        <a class="ms-card ms-card--accent-blue ms-card--click" href="/chatbox">
          <span class="ms-stat__icon ms-stat__icon--blue">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-message-circle"/></svg>
          </span>
          <h3 class="ms-card__title">Chat with the station</h3>
          <p class="ms-card__lede">Live two-way line to your assigned officer. Photos, voice notes, and case IDs supported.</p>
          <span class="ms-card__cta">Open chat
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-arrow-right"/></svg>
          </span>
        </a>

        <a class="ms-card ms-card--accent-green ms-card--click" href="/wanted-criminals">
          <span class="ms-stat__icon ms-stat__icon--green">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-shield-alert"/></svg>
          </span>
          <h3 class="ms-card__title">Browse wanted list</h3>
          <p class="ms-card__lede">Public roster of active warrants. Submit a tip anonymously from any card.</p>
          <span class="ms-card__cta">Open list
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-arrow-right"/></svg>
          </span>
        </a>
      </div>
    </section>

    <!-- Live ticker -->
    <section class="ms-section">
      <header class="ms-section-header">
        <div>
          <p class="ms-eyebrow">Live ticker</p>
          <h2 class="ms-section-header__title">What's happening right now</h2>
        </div>
        <a href="/admin" class="ms-btn ms-btn--ghost ms-btn--sm">
          <span>See all</span>
          <svg class="ms-icon" aria-hidden="true"><use href="#ms-arrow-right"/></svg>
        </a>
      </header>

      <div class="ms-card ms-card--no-pad">
        <ul class="ms-ticker" id="home-ticker" aria-live="polite">
          <li class="ms-ticker__row">
            <span class="ms-ticker__time">2 min ago</span>
            <span class="ms-pill ms-pill--red"><span class="ms-pill__dot"></span>Active</span>
            <span class="ms-ticker__title">Pickpocketing reported · Gulshan-1</span>
            <span class="ms-ticker__meta">Case #MS-2841 · Routed to Gulshan PS</span>
          </li>
          <li class="ms-ticker__row">
            <span class="ms-ticker__time">11 min ago</span>
            <span class="ms-pill ms-pill--amber"><span class="ms-pill__dot"></span>Pending</span>
            <span class="ms-ticker__title">Missing person alert · Mirpur-10 (F, 14)</span>
            <span class="ms-ticker__meta">Case #MS-2839 · Awaiting verification</span>
          </li>
          <li class="ms-ticker__row">
            <span class="ms-ticker__time">37 min ago</span>
            <span class="ms-pill ms-pill--green"><span class="ms-pill__dot"></span>Cleared</span>
            <span class="ms-ticker__title">Vehicle theft · Dhanmondi-15 — owner recovered</span>
            <span class="ms-ticker__meta">Case #MS-2832 · Closed by Dhanmondi PS</span>
          </li>
          <li class="ms-ticker__row">
            <span class="ms-ticker__time">1 h ago</span>
            <span class="ms-pill ms-pill--blue"><span class="ms-pill__dot"></span>Info</span>
            <span class="ms-ticker__title">Crowd control advisory · Motijheel</span>
            <span class="ms-ticker__meta">Public notice · Issued by OC Motijheel</span>
          </li>
        </ul>
      </div>
    </section>
  </template>

  <script src="/static/assets/js/api-base.js"></script>
  <script src="/static/assets/js/escape.js"></script>
  <script src="/static/assets/js/console.js"></script>
  <script src="/static/assets/js/globe.js"></script>
  <script>
  // Mount the globe after the shared shell has inserted our template content.
  document.addEventListener('DOMContentLoaded', function () {
    // console.js auto-renders #ms-root on DOMContentLoaded. After that
    // we want the globe to mount into the new #ms-globe element. Wait one
    // microtask + a paint so #ms-page exists.
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        if (window.MS && window.MS.globe) {
          window.MS.globe.mount('#ms-globe');
        }
      });
    });
  });
  </script>
</body>
</html>
