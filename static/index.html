<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citizen Dashboard · MySafety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/assets/css/console.css">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237C9BFF' stroke-width='2'><path d='M12 2 4 5v6c0 5 3.5 9.3 8 11 4.5-1.7 8-6 8-11V5l-8-3z'/></svg>">
</head>
<body>
  <div id="ms-root"></div>

  <!-- Page-specific content lives inside the shared shell. -->
  <template id="ms-page-template">
    <section class="ms-section">
      <header class="ms-page-header">
        <div>
          <p class="ms-eyebrow">Citizen Dashboard</p>
          <h1 class="ms-page-header__title">A live view of safety in your area.</h1>
          <p class="ms-page-header__sub">Cross-referenced with the last 90 days of filed incidents across Dhaka Metropolitan.</p>
        </div>
        <div class="ms-page-header__actions">
          <a href="/report-crime" class="ms-btn ms-btn--primary">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-alert-triangle"/></svg>
            <span>File a report</span>
          </a>
          <a href="/chatbox" class="ms-btn ms-btn--ghost">
            <svg class="ms-icon" aria-hidden="true"><use href="#ms-message-circle"/></svg>
            <span>Chat with the station</span>
          </a>
        </div>
      </header>

      <div class="ms-stats">
        <article class="ms-card ms-card--accent-green">
          <header class="ms-card__head">
            <span class="ms-stat__icon ms-stat__icon--green">
              <svg class="ms-icon" aria-hidden="true"><use href="#ms-check"/></svg>
            </span>
            <div>
              <p class="ms-card__eyebrow">Resolved this month</p>
              <p class="ms-card__title">186 cases cleared</p>
            </div>
          </header>
          <div class="ms-stat__figure" id="stat-resolved">186</div>
          <div class="ms-card__bar" style="--w:62%"></div>
        </article>
        <article class="ms-card ms-card--accent-amber">
          <header class="ms-card__head">
            <span class="ms-stat__icon ms-stat__icon--amber">
              <svg class="ms-icon" aria-hidden="true"><use href="#ms-bell"/></svg>
            </span>
            <div>
              <p class="ms-card__eyebrow">Pending investigation</p>
              <p class="ms-card__title">214 active reports</p>
            </div>
          </header>
          <div class="ms-stat__figure" id="stat-pending">214</div>
          <div class="ms-card__bar" style="--w:71%"></div>
        </article>
        <article class="ms-card ms-card--accent-red">
          <header class="ms-card__head">
            <span class="ms-stat__icon ms-stat__icon--red">
              <svg class="ms-icon" aria-hidden="true"><use href="#ms-shield-alert"/></svg>
            </span>
            <div>
              <p class="ms-card__eyebrow">Active station alerts</p>
              <p class="ms-card__title">3 in the last hour</p>
            </div>
          </header>
          <div class="ms-stat__figure" id="stat-alerts">3</div>
          <div class="ms-card__bar" style="--w:9%; background: var(--status-red);"></div>
        </article>
        <article class="ms-card ms-card--accent-blue">
          <header class="ms-card__head">
            <span class="ms-stat__icon ms-stat__icon--blue">
              <svg class="ms-icon" aria-hidden="true"><use href="#ms-globe-icon"/></svg>
            </span>
            <div>
              <p class="ms-card__eyebrow">Coverage</p>
              <p class="ms-card__title">18 sub-areas · 8 thanas</p>
            </div>
          </header>
          <div class="ms-stat__figure">427</div>
          <p class="ms-card__meta">incidents filed in 30 days</p>
        </article>
      </div>
    </section>

    <section class="ms-section">
      <header class="ms-section-header">
        <div>
          <p class="ms-eyebrow">Safest route planner</p>
          <h2 class="ms-section-header__title">Tell us where you're going. We'll cross-check the heatmap.</h2>
        </div>
        <span class="ms-pill ms-pill--green"><span class="ms-pill__dot"></span>Live feed</span>
      </header>

      <div class="ms-grid ms-grid--2">
        <article class="ms-card">
          <h3 class="ms-card__title">Plan your route</h3>
          <p class="ms-card__lede">No account required to plan a route. We compare your destination to filed incidents in the last 90 days.</p>

          <form id="route-form" class="ms-stack" autocomplete="off" novalidate>
            <label class="ms-field">
              <span class="ms-field__label">From</span>
              <span class="ms-field__control">
                <svg class="ms-icon ms-field__icon" aria-hidden="true"><use href="#ms-map-pin"/></svg>
                <input id="start" type="text" class="ms-input" placeholder="e.g. Banani, Dhaka">
                <button type="button" id="get-location" class="ms-btn ms-btn--ghost ms-btn--sm" aria-label="Use my location">
                  <svg class="ms-icon" aria-hidden="true"><use href="#ms-map-pin"/></svg>
                </button>
              </span>
            </label>
            <label class="ms-field">
              <span class="ms-field__label">To · destination</span>
              <span class="ms-field__control">
                <svg class="ms-icon ms-field__icon" aria-hidden="true"><use href="#ms-map-pin"/></svg>
                <input id="destination" type="text" class="ms-input" placeholder="e.g. Gulshan, Dhaka" required>
              </span>
            </label>
            <div class="ms-row">
              <label class="ms-field">
                <span class="ms-field__label">Time of visit</span>
                <input id="time" type="time" class="ms-input" required>
              </label>
              <label class="ms-field">
                <span class="ms-field__label">Age</span>
                <input id="age" type="number" class="ms-input" min="10" max="100" placeholder="25" required>
              </label>
            </div>
            <label class="ms-field">
              <span class="ms-field__label">Gender (optional)</span>
              <select id="gender" class="ms-select">
                <option value="">— Select —</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </label>

            <div class="ms-row ms-row--between">
              <button type="submit" class="ms-btn ms-btn--primary">
                <span>Find safest route</span>
                <svg class="ms-icon" aria-hidden="true"><use href="#ms-arrow-right"/></svg>
              </button>
              <button type="button" id="panic-btn" class="ms-btn ms-btn--danger" aria-label="Send panic alert">
                <svg class="ms-icon" aria-hidden="true"><use href="#ms-megaphone"/></svg>
                <span>Panic</span>
              </button>
            </div>
          </form>
        </article>

        <div class="ms-stack">
          <article class="ms-card ms-card--no-pad">
            <header class="ms-card__head ms-card__head--row">
              <div>
                <p class="ms-card__eyebrow">Heatmap</p>
                <p class="ms-card__title">Dhaka · 90-day window</p>
              </div>
              <span class="ms-card__legend">
                <span class="ms-legend-dot ms-legend-dot--blue"></span>Low
                <span class="ms-legend-dot ms-legend-dot--amber"></span>Mid
                <span class="ms-legend-dot ms-legend-dot--red"></span>High
              </span>
            </header>
            <div id="map" class="ms-map" role="application" aria-label="Crime heatmap of Dhaka"></div>
          </article>

          <article id="dossier" class="ms-card ms-card--accent-blue">
            <header class="ms-card__head">
              <span class="ms-stat__icon ms-stat__icon--blue">
                <svg class="ms-icon" aria-hidden="true"><use href="#ms-file-text"/></svg>
              </span>
              <div>
                <p class="ms-card__eyebrow">Local register</p>
                <p class="ms-card__title" id="dossier-status">— · —</p>
              </div>
            </header>
            <p class="ms-card__lede" id="dossier-default-status">Filing default register at Dhaka centroid. Enter a destination above to filter by area.</p>
          </article>
        </div>
      </div>
    </section>
  </template>

  <!-- Lightbox (kept for evidence popups from the bulletin driver) -->
  <div id="lightbox" class="ms-lightbox" aria-hidden="true" role="dialog" aria-modal="true" hidden>
    <button class="ms-lightbox__close" type="button" data-close aria-label="Close">
      <svg class="ms-icon" aria-hidden="true"><use href="#ms-x"/></svg>
    </button>
    <button class="ms-lightbox__nav ms-lightbox__nav--prev" type="button" data-nav="-1" aria-label="Previous">
      <svg class="ms-icon" aria-hidden="true"><use href="#ms-chevron-left"/></svg>
    </button>
    <button class="ms-lightbox__nav ms-lightbox__nav--next" type="button" data-nav="1" aria-label="Next">
      <svg class="ms-icon" aria-hidden="true"><use href="#ms-chevron-right"/></svg>
    </button>
    <div class="ms-lightbox__inner">
      <div class="ms-lightbox__media" id="lightbox-media"></div>
      <div class="ms-lightbox__caption" id="lightbox-caption">—</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="/static/assets/js/api-base.js"></script>
  <script src="/static/assets/js/escape.js"></script>
  <script src="/static/assets/js/console.js"></script>
  <script src="/static/assets/js/bulletin-stub.js"></script>
</body>
</html>
