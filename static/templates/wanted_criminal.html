<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Wanted List · MySafety</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/assets/css/console.css">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237C9BFF' stroke-width='2'><path d='M12 2 4 5v6c0 5 3.5 9.3 8 11 4.5-1.7 8-6 8-11V5l-8-3z'/></svg>">
</head>
<body>
  <div id="ms-root"></div>

  <template id="ms-page-template">
    <section class="ms-section">
      <header class="ms-page-header">
        <div>
          <p class="ms-eyebrow">Active warrants</p>
          <h1 class="ms-page-header__title">Wanted list</h1>
          <p class="ms-page-header__sub">Public roster of suspects with active warrants. Submit a sighting anonymously from any card.</p>
        </div>
        <div class="ms-page-header__actions">
          <span class="ms-pill ms-pill--red"><span class="ms-pill__dot"></span>Do not approach — call 999</span>
        </div>
      </header>

      <div id="wantedGrid" class="ms-grid ms-grid--3" aria-live="polite"></div>
    </section>
  </template>

  <div id="backdrop" class="ms-modal-back" hidden>
    <div class="ms-modal ms-modal--wide">
      <header class="ms-modal__head">
        <h2 id="modalTitle" class="ms-modal__title">Details</h2>
        <button id="closeModal" class="ms-modal__close" aria-label="Close">
          <svg class="ms-icon" aria-hidden="true"><use href="#ms-x"/></svg>
        </button>
      </header>
      <div id="modalBody" class="ms-modal__body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/static/assets/js/api-base.js"></script>
  <script src="/static/assets/js/escape.js"></script>
  <script src="/static/assets/js/console.js"></script>
  <script>
  "use strict";

  const API_BASE = window.location.origin.includes(':8000') ? '' : 'http://127.0.0.1:8000';
  const $ = sel => document.querySelector(sel);
  let wantedData = [];

  const fmt = dt => {
    if (!dt) return "Unknown";
    const parsed = typeof dt === "string" ? new Date(dt) : dt;
    return isNaN(parsed.valueOf()) ? "Unknown" : parsed.toLocaleString();
  };
  const resolvePhoto = (url) => {
    if (!url) return "contents/placeholder.jpg";
    if (url.startsWith("http")) return url;
    if (url.startsWith("/")) return url;
    if (url.startsWith("static/")) return `/${url}`;
    return `/static/${url}`;
  };

  function normalizeRow(row) {
    const crimes = row.crimes_committed ? String(row.crimes_committed).split(/\s*,\s*/).filter(Boolean) : [];
    const extractNumber = (value) => { if (!value) return null; const m = String(value).match(/(\d{2,3})/); return m ? Number(m[1]) : null; };
    const lastSeenSource = row.last_seen_reported_at || row.wanted_since || row.created_at;
    const lastSeenIso = lastSeenSource ? new Date(lastSeenSource).toISOString() : null;
    const lastSeenLocation = row.last_seen_reported_location || row.last_known_location || "Unknown";
    const withFinder = row.last_seen_with_finder || "No";
    return {
      id: row.criminal_id ?? row.id ?? null,
      name: row.name ?? "Unknown",
      photo_url: resolvePhoto(row.photo_url),
      last_seen_location: lastSeenLocation,
      last_seen_time: lastSeenIso,
      crimes, reward: Number(row.reward_amount ?? 0),
      age: extractNumber(row.age_range), height_cm: extractNumber(row.height),
      complexion: row.hair_color ?? "",
      note: [row.description ?? "", row.distinguishing_marks ?? ""].filter(Boolean).join(" "),
      status: row.status || "Unseen", with_finder: withFinder
    };
  }

  async function loadWantedCriminals() {
    try {
      const res = await fetch(resolveApiUrl('/api/wanted-criminals'), { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const payload = await res.json();
      const rows = Array.isArray(payload) ? payload : payload.wanted_criminals || [];
      wantedData = rows.map(normalizeRow);
      render(wantedData);
    } catch (error) {
      console.error("Error loading wanted criminals:", error);
      wantedData = [];
      render([]);
    }
  }

  function render(list) {
    const grid = $("#wantedGrid");
    grid.innerHTML = "";
    if (!list.length) {
      grid.innerHTML = `
        <div class="ms-empty ms-grid--span-3">
          <svg class="ms-icon ms-empty__icon" aria-hidden="true"><use href="#ms-shield"/></svg>
          <p>No wanted criminals on file right now.</p>
        </div>`;
      return;
    }
    list.forEach(it => grid.appendChild(card(it)));
  }

  function card(item) {
    const el = document.createElement("article");
    el.className = "ms-card ms-card--no-pad ms-card--accent-red";
    const crimesText = Array.isArray(item.crimes) && item.crimes.length ? item.crimes.join(", ") : "N/A";
    const rewardText = Number.isFinite(item.reward) ? item.reward.toLocaleString() : "0";
    const ageText = item.age ? `${item.age} yrs` : "N/A";
    const heightText = item.height_cm ? `${item.height_cm} cm` : "N/A";
    const statusText = (item.status || "Unseen").toString();
    const normalizedStatus = statusText.trim().toLowerCase();
    let pillClass = "ms-pill--red", pillLabel = "Unseen";
    if (normalizedStatus === "seen")      { pillClass = "ms-pill--green"; pillLabel = "Seen"; }
    else if (normalizedStatus === "captured") { pillClass = "ms-pill--ink"; pillLabel = "Captured"; }
    else if (normalizedStatus) { pillLabel = statusText.replace(/_/g, " "); }
    el.innerHTML = `
      <img class="ms-card__cover" src="${escapeHtml(item.photo_url || '')}" alt="${escapeHtml(item.name || '')}" onerror="this.src='contents/placeholder.jpg'">
      <div class="ms-card__body">
        <header class="ms-row ms-row--between">
          <div>
            <h3 class="ms-card__title">${escapeHtml(item.name || 'Unknown')}</h3>
            <p class="ms-card__sub">${escapeHtml(crimesText)}</p>
          </div>
          <span class="ms-pill ${pillClass}"><span class="ms-pill__dot"></span>${escapeHtml(pillLabel)}</span>
        </header>
        <dl class="ms-card__facts">
          <div><dt>Reward</dt><dd>৳${escapeHtml(rewardText)}</dd></div>
          <div><dt>Last seen</dt><dd>${escapeHtml(item.last_seen_location || '—')}</dd></div>
          <div><dt>Time</dt><dd>${escapeHtml(fmt(item.last_seen_time))}</dd></div>
          <div><dt>Age / Height</dt><dd>${escapeHtml(ageText)} · ${escapeHtml(heightText)}</dd></div>
        </dl>
        <button type="button" class="ms-btn ms-btn--danger ms-btn--sm ms-btn--block show">View details</button>
      </div>`;
    el.querySelector(".show").addEventListener("click", () => openModal(item));
    return el;
  }

  function openModal(item) {
    const crimesText = Array.isArray(item.crimes) && item.crimes.length ? item.crimes.join(", ") : "N/A";
    const rewardText = Number.isFinite(item.reward) ? item.reward.toLocaleString() : "0";
    const ageText = item.age ? `${item.age} yrs` : "N/A";
    const heightText = item.height_cm ? `${item.height_cm} cm` : "N/A";
    const complexionText = item.complexion || "N/A";
    const withFinderText = item.with_finder === "Yes" ? "Yes" : "No";
    const statusText = (item.status || "Unseen").toString();
    $("#modalTitle").textContent = item.name + " — Details";
    $("#modalBody").innerHTML = `
      <div class="ms-modal__grid">
        <img class="ms-modal__cover" src="${escapeHtml(item.photo_url || '')}" alt="${escapeHtml(item.name || '')}">
        <div class="ms-modal__copy">
          <p><b>Crimes:</b> ${crimesText}</p>
          <p><b>Last seen:</b> ${item.last_seen_location} at ${fmt(item.last_seen_time)}</p>
          <p><b>Reward:</b> ৳${rewardText}</p>
          <p><b>Age:</b> ${ageText}</p>
          <p><b>Height:</b> ${heightText}</p>
          <p><b>Complexion:</b> ${complexionText}</p>
          <p><b>Status:</b> ${statusText}</p>
          <p><b>With finder on last report:</b> ${withFinderText}</p>
          <p class="ms-card__sub">${escapeHtml(item.note || "")}</p>
          <button id="seenBtn" class="ms-btn ms-btn--primary">I have seen this person</button>
          <div id="seenWrap" class="ms-card ms-card--nested" hidden>
            <p class="ms-card__title">Report last seen (notifies police)</p>
            <label class="ms-field"><span class="ms-field__label">Time</span><input id="seen_time" type="datetime-local" class="ms-input"></label>
            <label class="ms-field"><span class="ms-field__label">Location</span>
              <span class="ms-field__control">
                <input id="seen_location" class="ms-input" placeholder="Type an address or use my location">
                <button type="button" id="geoSeen" class="ms-btn ms-btn--ghost ms-btn--sm">Use my location</button>
              </span>
            </label>
            <label class="ms-row"><input id="still_with_finder" type="checkbox"> <span>Still with finder</span></label>
            <button id="submitSeen" class="ms-btn ms-btn--primary ms-btn--block">Submit sighting</button>
          </div>
        </div>
      </div>`;
    $("#backdrop").hidden = false;
    $("#seenBtn").onclick = () => { $("#seenWrap").hidden = !$("#seenWrap").hidden; };
    $("#geoSeen").onclick = () => getCurrentCoords()
      .then(c => { $("#seen_location").value = c; })
      .catch(e => Swal.fire({ icon: 'error', title: 'Location error', text: e.message }));
    $("#submitSeen").onclick = async () => {
      const payload = {
        seen_time: $("#seen_time").value || null,
        seen_location: $("#seen_location").value.trim(),
        still_with_finder: $("#still_with_finder").checked
      };
      if (!payload.seen_location) {
        Swal.fire({ icon: 'warning', title: 'Location required', text: 'Please enter or capture a location.' });
        return;
      }
      try {
        const response = await fetch(resolveApiUrl(`/api/wanted-criminals/${item.id}/sighting`), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || data.message || 'Could not submit sighting');
        }
        Swal.fire({ icon: 'success', title: 'Sighting recorded', text: 'Police have been notified.' });
        closeModal();
      } catch (err) {
        Swal.fire({ icon: 'error', title: 'Could not submit', text: err.message });
      }
    };
  }

  const closeModal = () => { $("#backdrop").hidden = true; };
  $("#closeModal").addEventListener("click", closeModal);
  $("#backdrop").addEventListener("click", (e) => { if (e.target.id === "backdrop") closeModal(); });

  function getCurrentCoords() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error("Geolocation not supported"));
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve(`${pos.coords.latitude}, ${pos.coords.longitude}`),
        (err) => reject(err),
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    if (document.getElementById('wantedGrid')) loadWantedCriminals();
  });
  </script>
</body>
</html>
