<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Missing Person · MySafety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/assets/css/console.css">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237C9BFF' stroke-width='2'><path d='M12 2 4 5v6c0 5 3.5 9.3 8 11 4.5-1.7 8-6 8-11V5l-8-3z'/></svg>">
  <style>
    .ms-form-card { padding: 1.5rem 2rem; }
    .ms-form-card fieldset { border: 0; padding: 0; margin: 0 0 1.5rem 0; }
    .ms-form-card legend { font-size: 1.125rem; font-weight: 600; padding: 0; margin: 0 0 0.75rem 0; color: var(--ink-1); }
    .ms-form-card .ms-grid--form { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
    @media (min-width: 768px) { .ms-form-card .ms-grid--form { grid-template-columns: 1fr 1fr; } }
    .ms-form-card .ms-grid--form > .col-span-full { grid-column: 1 / -1; }
    .ms-form-card label > span { display: block; font-size: 0.85rem; color: var(--ink-2); margin-bottom: 0.4rem; }
    .ms-form-card input[type=text], .ms-form-card input[type=number], .ms-form-card input[type=date], .ms-form-card input[type=time], .ms-form-card input[type=email], .ms-form-card input[type=tel], .ms-form-card select, .ms-form-card textarea {
      width: 100%; padding: 0.7rem 0.9rem; border-radius: 8px;
      background: var(--bg-canvas); color: var(--ink-1);
      border: 1px solid var(--border-hair); font: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .ms-form-card input:focus, .ms-form-card select:focus, .ms-form-card textarea:focus { border-color: var(--accent-hi); }
  </style>
</head>
<body>
  <div id="ms-root"></div>
  <template id="ms-page-template">
    <section class="ms-section">
      <header class="ms-page-header">
        <div>
          <p class="ms-eyebrow">File a report</p>
          <h1 class="ms-page-header__title">Report a missing person</h1>
          <p class="ms-page-header__sub">Time-critical. We push a citywide alert and notify nearby stations the moment you submit.</p>
        </div>
      </header>
      <article class="ms-card ms-form-card">

    <form id="reportForm" class="bg-slate-800 p-6 rounded-xl space-y-6">
      <!-- Person Details -->
      <div>
        <h2 class="text-xl font-semibold mb-3">Person Details</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block mb-1">Full Name</label>
            <input name="full_name" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Nickname</label>
            <input name="nickname" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Hometown</label>
            <input name="hometown" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Age</label>
            <input type="number" name="age" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Weight (kg)</label>
            <input type="number" name="weight" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Hair Color</label>
            <input name="hair_color" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
        </div>
        <div class="mt-3">
          <label class="block mb-1">Photo / Evidence Upload (you can attach multiple)</label>
          <input type="file" name="photo_files" id="photo_files" accept="image/*,video/*,application/pdf" multiple class="w-full text-sm text-gray-300">
        </div>
      </div>

      <!-- Last Seen -->
      <div>
        <h2 class="text-xl font-semibold mb-3">Last Seen</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block mb-1">Time & Date</label>
            <input type="datetime-local" name="last_seen_time" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Location</label>
            <div class="flex gap-2">
              <input id="location" name="last_seen_location" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
              <button type="button" onclick="useMyLocation()" class="px-3 bg-slate-700 rounded">Use my location</button>
            </div>
          </div>
        </div>
        <div class="mt-3">
          <label class="block mb-1">Clothing / Appearance</label>
          <textarea name="description" rows="3" placeholder="Clothes, marks, height, accessories, etc." class="w-full px-3 py-2 bg-slate-900 rounded text-white"></textarea>
        </div>
      </div>

      <!-- Medical Needs -->
      <div>
        <h2 class="text-xl font-semibold mb-3">Medical Needs</h2>
        <textarea name="medical_needs" rows="3" placeholder="e.g. Diabetes – requires insulin, epilepsy, heart condition, daily medicines" class="w-full px-3 py-2 bg-slate-900 rounded text-white"></textarea>
      </div>

      <!-- Reporter Contact -->
      <div>
        <h2 class="text-xl font-semibold mb-3">Reporter Contact</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block mb-1">Your Name</label>
            <input name="reporter_name" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Phone</label>
            <input name="reporter_phone" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Email</label>
            <input name="reporter_email" type="email" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
          <div>
            <label class="block mb-1">Relation</label>
            <input name="reporter_relation" placeholder="Parent / sibling / neighbor / other" class="w-full px-3 py-2 bg-slate-900 rounded text-white">
          </div>
        </div>
      </div>

      <p class="text-sm text-gray-400">By submitting, you consent to share these details with law enforcement.</p>
      
      <button class="w-full py-3 bg-green-500 hover:bg-green-600 rounded text-black font-semibold">Submit Report</button>
      </article>
    </section>
  </template>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/static/assets/js/api-base.js"></script>
  <script src="/static/assets/js/escape.js"></script>
  <script src="/static/assets/js/console.js"></script>
  <script>
  /* User menu and theme toggle are owned by console.js (the redesigned chrome).
     The legacy #user-menu-button / #user-menu / #theme-toggle wiring was removed. */

  function useMyLocation(){
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((pos) => {
        document.getElementById("location").value = pos.coords.latitude.toFixed(6)+", "+pos.coords.longitude.toFixed(6);
      }, (err) => {
        let message = "Location access denied or unavailable.";
        if (err && typeof err.code === "number") {
          switch (err.code) {
            case err.PERMISSION_DENIED:
              message = "Location access was denied. Please allow access and try again.";
              break;
            case err.POSITION_UNAVAILABLE:
              message = "Location information is unavailable right now.";
              break;
            case err.TIMEOUT:
              message = "Fetching location timed out. Please try again.";
              break;
            default:
              message = "Unable to retrieve location.";
          }
        }
        Swal.fire({
          icon: 'error',
          title: 'Location Error',
          text: message,
          confirmButtonColor: '#EF4444'
        });
      });
    } else {
      Swal.fire({
        icon: 'warning',
        title: 'Unsupported Feature',
        text: 'Geolocation is not supported by this browser.',
        confirmButtonColor: '#F59E0B'
      });
    }
  }

  // api-base.js sets API_BASE / resolveApiUrl / fetch wrapper.

  async function uploadFileIfPresentById(fileInputElem) {
    if (!fileInputElem || !fileInputElem.files || fileInputElem.files.length === 0) return [];
    const uploaded = [];
    for (const f of fileInputElem.files) {
      const form = new FormData();
      form.append('file', f);
      const res = await fetch(resolveApiUrl('/api/upload'), { method: 'POST', body: form });
      const raw = await res.text().catch(() => res.statusText);
      if (!res.ok) throw new Error(`Upload failed: ${res.status} ${res.statusText} — ${raw}`);
      try {
        const parsed = JSON.parse(raw);
        uploaded.push(parsed.file_url || parsed.url || raw);
      } catch {
        uploaded.push(raw);
      }
    }
    return uploaded;
  }

  // Debug-friendly submit handler
  (function () {
    const form = document.getElementById('reportForm');
    if (!form) { console.warn('reportForm not found'); return; }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = e.submitter || form.querySelector('button[type="submit"]') || null;
      const origText = submitBtn ? submitBtn.textContent : null;
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Submitting...'; }

      try {
        // Collect fields (adapt selectors if your inputs use different IDs/names)
        const get = sel => (document.querySelector(sel) || {}).value || null;
        const payload = {
          full_name: get('input[name="full_name"]') || get('#full_name'),
          nickname: get('input[name="nickname"]'),
          hometown: get('input[name="hometown"]'),
          age: get('input[name="age"]'),
          weight: get('input[name="weight"]'),
          hair_color: get('input[name="hair_color"]'),
          photo_url: null,
          last_seen_time: get('input[name="last_seen_time"]'),
          last_seen_location: get('input[name="last_seen_location"], #location'),
          description: (document.querySelector('textarea[name="description"]')||{}).value || null,
          medical_needs: (document.querySelector('textarea[name="medical_needs"]')||{}).value || null,
          reporter_name: get('input[name="reporter_name"]'),
          reporter_phone: get('input[name="reporter_phone"]'),
          reporter_email: get('input[name="reporter_email"]'),
          reporter_relation: get('input[name="reporter_relation"]')
        };

        // upload photo if present
        const photoInput = document.getElementById('photo_files'); // matches your form input
        if (photoInput && photoInput.files && photoInput.files.length) {
          payload.photo_url = await uploadFileIfPresentById(photoInput);
        }

        console.info('Sending payload to', `${API_BASE}/api/missing-persons`, payload);
        const res = await fetch(`${API_BASE}/api/missing-persons`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const rawBody = await res.text().catch(()=> '');
        let parsed = null;
        try { parsed = rawBody ? JSON.parse(rawBody) : null; } catch (err) { parsed = null; }

        if (!res.ok) {
          // Show full server response and status for debugging
          const serverMsg = parsed?.detail || parsed?.message || rawBody || res.statusText;
          console.error('Submit failed', res.status, res.statusText, parsed || rawBody);
          await Swal.fire({
            icon: 'error',
            title: 'Submission Failed',
            text: `Failed to submit: ${res.status} ${res.statusText}. ${serverMsg || ''}`.trim(),
            confirmButtonColor: '#EF4444'
          });
          return;
        }

        console.info('Submit success', parsed || rawBody);
        await Swal.fire({
          icon: 'success',
          title: 'Report Submitted',
          text: parsed?.message || 'Your missing person report has been submitted successfully.',
          confirmButtonColor: '#10B981'
        });
        form.reset();

      } catch (err) {
        console.error('Submission error', err);
        await Swal.fire({
          icon: 'error',
          title: 'Unexpected Error',
          text: 'Submission error: ' + (err.message || String(err)),
          confirmButtonColor: '#EF4444'
        });
      } finally {
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = origText; }
      }
    });
  })();

// Reporting menu (#report-dropdown) is owned by console.js (the redesigned topbar).
// The legacy wiring was removed because the elements no longer exist in the chrome.

  </script>
</body>
</html>
