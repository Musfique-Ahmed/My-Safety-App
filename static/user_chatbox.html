<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat · MySafety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/assets/css/console.css">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237C9BFF' stroke-width='2'><path d='M12 2 4 5v6c0 5 3.5 9.3 8 11 4.5-1.7 8-6 8-11V5l-8-3z'/></svg>">
</head>
<body>
  <div id="ms-root"></div>

  <template id="ms-page-template">
    <section class="ms-section">
      <header class="ms-page-header">
        <div>
          <p class="ms-eyebrow">Live support</p>
          <h1 class="ms-page-header__title">Chat with the station</h1>
          <p class="ms-page-header__sub">Secure two-way line to your assigned officer. Polled every 3s for new messages.</p>
        </div>
        <div class="ms-page-header__actions">
          <span class="ms-pill ms-pill--blue"><span class="ms-pill__dot"></span>Connected</span>
        </div>
      </header>

      <article class="ms-chat">
        <aside class="ms-chat__sidebar">
          <header class="ms-chat__sidebar-head">
            <p class="ms-eyebrow">Conversations</p>
          </header>
          <ul class="ms-chat__convlist" id="conversation-list" aria-label="Active reports">
            <li class="ms-chat__conv is-active" data-conv="1">
              <p class="ms-chat__conv-title">Report UR-001</p>
              <p class="ms-chat__conv-sub">Theft at Dhanmondi</p>
              <span class="ms-pill ms-pill--amber"><span class="ms-pill__dot"></span>Open</span>
            </li>
            <li class="ms-chat__conv" data-conv="2">
              <p class="ms-chat__conv-title">Report UR-002</p>
              <p class="ms-chat__conv-sub">Mugging incident</p>
              <span class="ms-pill ms-pill--blue"><span class="ms-pill__dot"></span>Info</span>
            </li>
            <li class="ms-chat__conv" data-conv="3">
              <p class="ms-chat__conv-title">Report UR-003</p>
              <p class="ms-chat__conv-sub">Cyber Crime Report</p>
              <span class="ms-pill ms-pill--green"><span class="ms-pill__dot"></span>Resolved</span>
            </li>
          </ul>
        </aside>

        <div class="ms-chat__main">
          <header class="ms-chat__head">
            <div>
              <p class="ms-eyebrow" id="chat-report-id">Report UR-001</p>
              <h2 class="ms-chat__title" id="chat-conversation-title">Theft at Dhanmondi</h2>
            </div>
            <span class="ms-pill ms-pill--green"><span class="ms-pill__dot"></span>Online</span>
          </header>

          <div id="messages-container" class="ms-chat__messages" aria-live="polite">
            <div class="ms-empty" id="chat-placeholder">
              <svg class="ms-icon ms-empty__icon" aria-hidden="true"><use href="#ms-message-circle"/></svg>
              <p>Select a report on the left to view the conversation.</p>
            </div>
          </div>

          <form id="message-input-area" class="ms-chat__form" autocomplete="off">
            <input type="text" id="message-input" class="ms-input" placeholder="Type your message…">
            <button type="submit" id="send-button" class="ms-btn ms-btn--primary">
              <svg class="ms-icon" aria-hidden="true"><use href="#ms-arrow-right"/></svg>
              <span>Send</span>
            </button>
          </form>
        </div>
      </article>
    </section>
  </template>

  <script src="/static/assets/js/api-base.js"></script>
  <script src="/static/assets/js/escape.js"></script>
  <script src="/static/assets/js/console.js"></script>
  <script>
  "use strict";

  let currentUserConversation = '1';
  let userChatPollingInterval = null;
  let currentUserId = 1;

  // Resolve the actual logged-in user from the same source of truth as
  // the rest of the console (console.js keeps it in localStorage).
  function _readUserId() {
    try {
      var raw = localStorage.getItem('currentUser');
      if (raw) {
        var u = JSON.parse(raw);
        if (u && (u.user_id || u.id)) return u.user_id || u.id;
      }
    } catch (e) {}
    return Number(localStorage.getItem('currentUserId')) || 1;
  }

  function formatMessageTime(timestamp) {
    var date = new Date(timestamp);
    var now = new Date();
    var diffMs = now - date;
    var diffMins = Math.floor(diffMs / 60000);
    var diffHours = Math.floor(diffMs / 3600000);
    var diffDays = Math.floor(diffMs / 86400000);
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return diffMins + ' min ago';
    if (diffHours < 24) return diffHours + ' hour' + (diffHours > 1 ? 's' : '') + ' ago';
    if (diffDays < 7) return diffDays + ' day' + (diffDays > 1 ? 's' : '') + ' ago';
    return date.toLocaleDateString();
  }

  function renderMessages(messages) {
    var container = document.getElementById('messages-container');
    if (!container) return;
    if (!messages || !messages.length) {
      container.innerHTML =
        '<div class="ms-empty">' +
        '<svg class="ms-icon ms-empty__icon" aria-hidden="true"><use href="#ms-message-circle"/></svg>' +
        '<p>No messages yet. Send the first one.</p></div>';
      return;
    }
    container.innerHTML = messages.map(function (msg) {
      var isAdmin = msg.is_admin || msg.isAdmin;
      return '<div class="ms-bubble ms-bubble--' + (isAdmin ? 'admin' : 'me') + '">' +
        '<p class="ms-bubble__sender">' + (isAdmin ? 'Support team' : 'You') + '</p>' +
        '<p class="ms-bubble__text">' + escapeHtml(msg.message) + '</p>' +
        '<p class="ms-bubble__time">' + escapeHtml(formatMessageTime(msg.created_at)) + '</p>' +
      '</div>';
    }).join('');
    setTimeout(function () { container.scrollTop = container.scrollHeight; }, 0);
  }

  async function loadUserConversations() {
    try {
      var r = await fetch(resolveApiUrl('/api/chat/user-conversations/' + currentUserId));
      var data = await r.json();
      console.log('User conversations:', data.conversations);
    } catch (e) { console.error('loadUserConversations', e); }
  }

  function selectUserConversation(reportId) {
    currentUserConversation = String(reportId);
    document.querySelectorAll('.ms-chat__conv').forEach(function (li) {
      li.classList.toggle('is-active', li.dataset.conv === currentUserConversation);
    });
    var convTitles = {
      '1': 'Theft at Dhanmondi',
      '2': 'Mugging incident',
      '3': 'Cyber Crime Report'
    };
    var titleEl = document.getElementById('chat-conversation-title');
    if (titleEl) titleEl.textContent = convTitles[currentUserConversation] || 'Conversation';
    var reportEl = document.getElementById('chat-report-id');
    if (reportEl) reportEl.textContent = 'Report UR-' + String(reportId).padStart(3, '0');

    loadUserMessages(currentUserConversation);
    if (userChatPollingInterval) clearInterval(userChatPollingInterval);
    userChatPollingInterval = setInterval(function () { loadUserMessages(currentUserConversation, false); }, 3000);
  }

  async function loadUserMessages(reportId, showLoading) {
    try {
      var container = document.getElementById('messages-container');
      if (showLoading && container) {
        container.innerHTML = '<div class="ms-empty">Loading messages…</div>';
      }
      var r = await fetch(resolveApiUrl('/api/chat/conversation/' + currentUserId + '?report_id=' + encodeURIComponent(reportId)));
      var data = await r.json();
      renderMessages(data.messages || []);
    } catch (e) { console.error('loadUserMessages', e); }
  }

  async function sendUserMessage() {
    var input = document.getElementById('message-input');
    var message = input ? input.value.trim() : '';
    if (!message) return;
    try {
      var r = await fetch(resolveApiUrl('/api/chat/send'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: currentUserId,
          message: message,
          report_id: currentUserConversation,
          is_admin: false
        })
      });
      var result = await r.json();
      if (result && (result.message || r.ok)) {
        input.value = '';
        await loadUserMessages(currentUserConversation, false);
      }
    } catch (e) {
      console.error('sendUserMessage', e);
      if (window.MS) window.MS.toast('Failed to send. Try again.', 'red');
    }
  }

  function _wireChat() {
    var sendBtn = document.getElementById('send-button');
    var input = document.getElementById('message-input');
    var form = document.getElementById('message-input-area');
    if (sendBtn) sendBtn.addEventListener('click', function (e) { e.preventDefault(); sendUserMessage(); });
    if (form) form.addEventListener('submit', function (e) { e.preventDefault(); sendUserMessage(); });
    if (input) {
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUserMessage(); }
      });
    }
    document.querySelectorAll('.ms-chat__conv').forEach(function (li) {
      li.addEventListener('click', function () { selectUserConversation(li.dataset.conv); });
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    currentUserId = _readUserId();
    // The shared chrome has moved the template into #ms-page, so the chat
    // elements exist by the time this listener runs.
    if (document.getElementById('messages-container')) {
      _wireChat();
      loadUserConversations();
      selectUserConversation(currentUserConversation);
    }
  });

  window.addEventListener('beforeunload', function () {
    if (userChatPollingInterval) clearInterval(userChatPollingInterval);
  });
  </script>
</body>
</html>
